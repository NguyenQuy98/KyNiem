<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tết An Khang</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:#140000;
}

/* ===== BACKGROUND ===== */
.scene{
  position:relative;
  width:100%;
  height:100vh;
  background:
    radial-gradient(circle at 50% 20%, #5b0f0f 0%, #1a0000 70%);
}

/* MOON */
.moon{
  position:absolute;
  top:40px;
  right:40px;
  width:80px;
  height:80px;
  border-radius:50%;
  background:#ffe8a3;
  box-shadow:0 0 40px rgba(255,232,163,.6);
}

/* ===== TREE ===== */
.tree{
  position:absolute;
  bottom:-20px;
  left:50%;
  transform:translateX(-50%);
  width:180px;
  height:260px;
  z-index:3;
}

/* ===== BLOSSOM AREA ===== */
.blossom-area{
  position:absolute;
  bottom:110px;
  left:50%;
  transform:translateX(-50%);
  width:320px;
  height:380px;
  z-index:2;
}

/* ===== FLOWER FALL ===== */
.flower{
  position:absolute;
  top:-20px;
  width:14px;
  height:14px;
  background:pink;
  border-radius:50%;
  opacity:.8;
  animation:fall linear infinite;
}

@keyframes fall{
  to{
    transform:translateY(120vh) rotate(360deg);
  }
}

/* ===== LANTERN ===== */
.lantern{
  position:absolute;
  width:64px;
  animation:float 10s ease-in-out infinite;
  cursor:pointer;
}

@keyframes float{
  0%{transform:translateY(0)}
  50%{transform:translateY(-40px)}
  100%{transform:translateY(0)}
}

.lantern svg{
  width:100%;
}

.photo{
  width:50px;
  height:50px;
  margin:0 auto;
  border-radius:6px;
  overflow:hidden;
  border:2px solid gold;
  background:#fff;
}

.photo img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* ===== MODAL ===== */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:10;
}

.modal-content{
  background:#fff3d6;
  padding:20px;
  border-radius:12px;
  width:80%;
  text-align:center;
}

.modal-content h2{
  color:#b00000;
  margin-bottom:10px;
}

/* ===== TEXT ===== */
.title{
  position:absolute;
  top:30px;
  left:50%;
  transform:translateX(-50%);
  color:#ffd966;
  font-size:20px;
  letter-spacing:2px;
}
</style>
</head>

<body>

<div class="scene" id="scene">
  <div class="moon"></div>
  <div class="title">🌸 Chúc Mừng Năm Mới 🌸</div>

  <!-- BLOSSOM SVG -->
  <svg class="blossom-area" viewBox="0 0 300 350">
    <g fill="#ff9bb4">
      <circle cx="150" cy="80" r="70"/>
      <circle cx="90" cy="130" r="60"/>
      <circle cx="210" cy="130" r="60"/>
      <circle cx="120" cy="200" r="55"/>
      <circle cx="180" cy="200" r="55"/>
    </g>
  </svg>

  <!-- TREE SVG -->
  <svg class="tree" viewBox="0 0 200 300">
    <path d="M100 300 
             C90 240,110 220,100 180
             C80 160,70 120,90 90
             C60 60,90 40,100 20
             C110 40,140 60,110 90
             C130 120,120 160,100 180
             C90 220,110 240,100 300"
          fill="#5a2d0c"/>
  </svg>

  <!-- LANTERNS -->
  <div class="lantern" style="left:10%;top:20%" onclick="openModal()">
    <svg viewBox="0 0 60 80">
      <ellipse cx="30" cy="40" rx="25" ry="35" fill="#d40000"/>
    </svg>
    <div class="photo"><img src="https://picsum.photos/100?1"></div>
  </div>

  <div class="lantern" style="left:70%;top:25%;animation-delay:2s" onclick="openModal()">
    <svg viewBox="0 0 60 80">
      <ellipse cx="30" cy="40" rx="25" ry="35" fill="#d40000"/>
    </svg>
    <div class="photo"><img src="https://picsum.photos/100?2"></div>
  </div>

</div>

<!-- MODAL -->
<div class="modal" id="modal" onclick="closeModal()">
  <div class="modal-content">
    <h2>🎉 Lời Chúc 🎉</h2>
    <p>An khang – Thịnh vượng – Vạn sự như ý</p>
  </div>
</div>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="https://cdn.pixabay.com/audio/2022/01/18/audio_9e6db39f16.mp3" type="audio/mpeg">
</audio>

<script>
/* FLOWER FALL */
for(let i=0;i<30;i++){
  const f=document.createElement("div");
  f.className="flower";
  f.style.left=Math.random()*100+"%";
  f.style.animationDuration=5+Math.random()*5+"s";
  document.body.appendChild(f);
}

/* MODAL */
function openModal(){
  document.getElementById("modal").style.display="flex";
  document.getElementById("music").play();
}
function closeModal(){
  document.getElementById("modal").style.display="none";
}

/* PARALLAX */
window.addEventListener("deviceorientation",e=>{
  const x=e.gamma/20;
  const y=e.beta/40;
  document.getElementById("scene").style.transform=
    `translate(${x}px,${y}px)`;
});
</script>

</body>
</html>
